name: Mr. Spiky review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    uses: Arpan-206/mr-spiky/.github/workflows/mr-spiky-review.yml@main
    # min_score defaults to 0.90 (same as the analyze flag threshold);
    # max_comments defaults to 5. Both left as defaults here.
    secrets:
      # Optional. If set on this repo, Claude Haiku rewrites each flag's
      # reason into reviewer voice. Falls back silently to templated
      # reasons when unset or on API failure.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

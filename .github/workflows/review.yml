name: Mr. Spiky review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    uses: Arpan-206/mr-spiky/.github/workflows/mr-spiky-review.yml@main
    with:
      # 0.90 gives room for structural-only signal (naming, complexity,
      # hidden_calls) to comment. 0.95 was previously tuned for the
      # older feature space and left most junior gnarl silent.
      min_score: 0.90
      max_comments: 5
    secrets:
      # Optional. If set on this repo, Claude Haiku rewrites each flag's
      # reason into reviewer voice. Falls back silently to templated
      # reasons when unset or on API failure.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
